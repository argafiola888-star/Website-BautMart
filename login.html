<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - BAUT MART</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #e0f7fa; text-align: center; }
        header { background-color:blueviolet; color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .login-box { background: white; margin: 50px auto; padding: 30px; width: 350px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .login-box input, .login-box select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-login { background-color: #2196F3; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <h1> BAUT MART</h1>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="katalog.html">Katalog</a>
            <a href="tracking.html">Tracking</a>
            <a href="login.html">Login / Daftar</a>
        </nav>
    </header>

    <div class="login-box">
        <h2>Masuk ke Akun</h2>
        <form onsubmit="event.preventDefault(); alert('Berhasil Login! Selamat datang di Sistem BAUT MART.'); window.location.href='index.html';">
            <select required>
                <option value="">-- Pilih Peran (Role) --</option>
                <option value="pembeli">Masuk sebagai Pembeli</option>
                <option value="pemasok">Masuk sebagai Pemasok</option>
            </select>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Masuk</button>
        </form>
    </div>
</body>
</html>
